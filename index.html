<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MDRO Audit</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">

</head>

<body>

<div class="container py-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">
                แบบประเมินการดูแลผู้ป่วยเชื้อดื้อยา (MDRO Audit)
            </h3>
        </div>

        <div class="card-body">

            <div class="row mb-3">

                <div class="col-md-3">
                    <label class="form-label">
                        วันที่ประเมิน
                    </label>

                    <input
                        type="date"
                        id="auditDate"
                        class="form-control">
                </div>

                <div class="col-md-3">
                    <label class="form-label">
                        หอผู้ป่วย
                    </label>

                    <input
                        type="text"
                        id="ward"
                        class="form-control"
                        placeholder="เช่น อายุรกรรมหญิง">
                </div>

                <div class="col-md-3">
                    <label class="form-label">
                        ผู้ประเมิน
                    </label>

                    <input
                        type="text"
                        id="auditor"
                        class="form-control"
                        placeholder="ชื่อผู้ประเมิน">
                </div>

                <div class="col-md-3">
                    <label class="form-label">
                        ประเภทเชื้อ
                    </label>

                    <select
                        id="organism"
                        class="form-select">

                        <option value="MRSA">MRSA</option>
                        <option value="CRE">CRE</option>
                        <option value="VRE">VRE</option>
                        <option value="CRAB">CRAB</option>
                        <option value="MDR อื่นๆ">MDR อื่นๆ</option>

                    </select>

                </div>

            </div>

            <hr>

            <!-- Checklist จะถูกสร้างจาก app.js -->
            <div id="checklist"></div>

            <div class="text-center mt-4">

                <button
                    type="button"
                    class="btn btn-success btn-lg"
                    onclick="saveData()">

                    💾 บันทึกข้อมูล

                </button>

                <a
                    href="dashboard.html"
                    class="btn btn-primary btn-lg">

                    📊 Dashboard

                </a>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- โหลด app.js -->
<script src="js/app.js"></script>

</body>
</html>
